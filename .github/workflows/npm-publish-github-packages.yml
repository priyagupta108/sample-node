name: CI 

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        
      - name: Enable Corepack
        run: corepack enable
        
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 14.x
          cache: "yarn"

      - name: Verify Node/Yarn
        run: |
          node --version
          yarn --version

      - name: Install dependencies
        run: yarn install --frozen-lockfile

    
